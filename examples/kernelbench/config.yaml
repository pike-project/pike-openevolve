# Configuration for function minimization example
max_iterations: 300
checkpoint_interval: 10

# LLM configuration
llm:
  # primary_model: "lbl/llama"
  primary_model: "gemini-2.5-pro"
  # primary_model: "llama3.1-8b"
  primary_model_weight: 1.0
  # secondary_model: "lbl/cborg-deepthought"
  secondary_model: "gemini-2.5-pro"
  # secondary_model: "llama-4-scout-17b-16e-instruct"
  secondary_model_weight: 0.0
  # api_base: "https://api.cborg.lbl.gov"
  api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
  # api_base: "https://api.cerebras.ai/v1"
  temperature: 0.8
  max_tokens: 32000
  timeout: 900

# Prompt configuration
prompt:
  # Important: template_dir must be relative to the dir from which you run the example
  template_dir: "examples/kernelbench/templates"
  system_message: "You are a performance engineering expert"

  # Number of previous top programs to include in the prompt.
  # This number is also used to determine the number of of "inspiration" programs (more randomly sampled)
  # in the prompt.
  num_top_programs: 3

# Database configuration
database:
  population_size: 10
  archive_size: 5
  num_islands: 3
  # the elite_selection_ratio tells us the percentage of elite programs that will be included in
  # the "inspiration" set of solutions that are provided as part of the prompt
  elite_selection_ratio: 0.2
  # the exploration, exploitation, and random ratios dictate where to sample from for the "Current Program" handed
  # to the LLM to optimize
  exploration_ratio: 0.2
  exploitation_ratio: 0.7
  # the remaining (1 - (exploration_ratio + exploitation_ratio)) => random sampling
  log_prompts: true

# Evaluator configuration
evaluator:
  # let our eval worker handle timeout, not OpenEvolve
  timeout: 1000000000000
  cascade_evaluation: false
  # cascade_thresholds: [1.3]
  parallel_evaluations: 20

# Evolution settings
# diff_based_evolution: true
diff_based_evolution: false
max_code_length: 100000
